name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      worker: ${{ steps.filter.outputs.worker }}
      client: ${{ steps.filter.outputs.client }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
              - '.github/workflows/**'
            worker:
              - 'worker-server/**'
              - '.github/workflows/**'
            client:
              - 'client/**'
              - '.github/workflows/**'

  server:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.server == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache: true
      - run: go mod download
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.3
          working-directory: server
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...

  worker:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.worker == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: worker-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: worker-server/go.mod
          cache: true
      - run: go mod download
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.3
          working-directory: worker-server
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...

  client:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.client == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('client/**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install
      - run: bun run lint
      - run: bun run build
