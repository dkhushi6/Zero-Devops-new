version: "2"

linters:
  default: none
  enable:
    - asciicheck
    - bodyclose
    - copyloopvar
    - depguard
    - dogsled
    - dupl
    - errcheck
    - funlen
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - goprintffuncname
    - gosec
    - ineffassign
    - lll
    - misspell
    - mnd
    - nakedret
    - noctx
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    depguard:
        rules:
          Main:
            files:
              - "$all"
            allow:
              - "$gostd"
              - "Zero_Devops"
              - "github.com/labstack/echo/v5"
              - "github.com/lib/pq"
              - "github.com/rabbitmq/amqp091-go"
              - "github.com/spf13/viper"
              - "github.com/golang-jwt/jwt/v5"
              - "golang.org/x/oauth2"
              - "golang.org/x/oauth2/github"
              - "go.uber.org/zap"
              - "github.com/google/uuid"
              - "github.com/aws/aws-sdk-go-v2/aws"
              - "github.com/aws/aws-sdk-go-v2/config"
              - "github.com/aws/aws-sdk-go-v2/credentials"
              - "github.com/aws/aws-sdk-go-v2/service/s3"
              - "github.com/moby/go-archive"
              - "github.com/moby/moby/client"
    dupl:
      threshold: 300
    funlen:
      lines: 200
      statements: 55
    goconst:
      min-len: 2
      min-occurrences: 3
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - performance
        - style
        - opinionated
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
        - wrapperFunc
        - hugeParam
    gocyclo:
      min-complexity: 20
    govet:
      enable:
        - shadow
    lll:
      line-length: 160
    misspell:
      locale: US
    mnd:
      checks:
        - argument
        - case
        - condition
        - return
      ignored-numbers:
        - "0"
        - "1"
        - "2"
        - "3"
      ignored-functions:
        - strings.SplitN
    nolintlint:
      allow-unused: false
      require-explanation: false
      require-specific: false
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - mnd
          - dupl
          - goconst
      - path: app
        text: "don't use `init` function"
    paths: []
formatters:
  enable:
    - gofmt
    - goimports

run:
  timeout: 5m
  go: "1.25"
